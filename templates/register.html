{% extends "base.html" %}

{% block content %}


    <div class="box">
        <h2>Register Form</h2>
        <form method="POST">
            <input type="hidden" name="action" value="register">
            <input type="text" name="username " placeholder="Chose Username" required>
            <input type="password" name="password" placeholder="Chose Password" required>
            <button type="submit" class="btn-register">Sign Up</button>
        </form>
    </div>

    
{% endblock %}
